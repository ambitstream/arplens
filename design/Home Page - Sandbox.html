<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArpLens — Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-0); color: var(--text-hi); font-family: var(--font-sans); }

      .bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid var(--line); background: var(--bg-2); }
      .mark { display: flex; align-items: center; gap: 9px; }
      .mark img { width: 22px; height: 22px; display: block; }
      .word { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; }
      .status { display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11px; color: var(--text-lo); letter-spacing: 0.05em; }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sem-green); box-shadow: 0 0 8px -1px var(--sem-green); }

      main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 24px 48px; gap: 28px; }

      .hero { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; max-width: 30rem; }
      .brand { display: flex; align-items: center; gap: 10px; }
      .brand__mark { width: 48px; height: 48px; display: block; }
      h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.025em; }
      h1 b { color: var(--accent); font-weight: 600; }
      .headline { font-size: 1rem; color: var(--text-hi); }
      .subtitle { font-size: 0.8125rem; color: var(--text-mid); }

      .card { width: 640px; max-width: 100%; border-radius: var(--r-lg); background: var(--bg-1); border: 1px solid var(--line); overflow: visible; }
      .card__strip { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 1px solid var(--line); }
      .card__id { display: flex; align-items: center; gap: 9px; }
      .card__num { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--bg-0); background: var(--accent); padding: 2px 6px; border-radius: 3px; font-weight: 600; }
      .card__title { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-hi); }
      .card__hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-lo); }
      .card__body { padding: 18px; }

      .confrow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .confrow__title { font-size: 15px; font-weight: 600; }

      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .param { position: relative; border-radius: var(--r-md); background: var(--bg-2); border: 1px solid var(--line); padding: 13px 14px; }
      .param--wide { grid-column: 1 / -1; }
      .param__k { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-lo); display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 8px; }
      .param__k-l { display: flex; align-items: center; gap: 6px; }
      .param__row { display: flex; align-items: center; justify-content: flex-start; gap: 8px; }
      .param__v { font-family: var(--font-mono); font-size: 22px; font-weight: 500; color: var(--text-hi); }
      .param__v--editable { cursor: pointer; }
      .param__v--editable:hover { color: var(--accent); }

      .icnbtn { width: 22px; height: 22px; border-radius: 5px; background: var(--bg-1); border: 1px solid var(--line); color: var(--text-mid); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; flex: 0 0 auto; }
      .icnbtn:hover { color: var(--text-hi); border-color: var(--text-lo); }
      .icnbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .icnbtn:disabled { opacity: 0.35; cursor: not-allowed; }
      .steppers { display: flex; align-items: center; gap: 8px; }
      .steppers .icnbtn { width: 26px; height: 26px; font-size: 13px; }
      .mini-ops { display: flex; align-items: center; gap: 6px; }
      .mini-ops .icnbtn { font-family: var(--font-mono); font-size: 10px; width: auto; padding: 0 7px; height: 22px; }

      .menu { position: absolute; z-index: 20; top: calc(100% + 6px); right: 14px; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-sm); box-shadow: 0 10px 24px -8px rgba(0,0,0,0.5); display: none; flex-direction: column; padding: 4px; min-width: 108px; }
      .menu.is-open { display: flex; }
      .menu button { text-align: left; background: none; border: none; color: var(--text-hi); font-family: var(--font-mono); font-size: 12.5px; padding: 7px 9px; border-radius: 4px; cursor: pointer; }
      .menu button:hover { background: color-mix(in oklab, var(--accent) 14%, transparent); color: var(--accent); }
      .menu button.is-current { color: var(--accent); }
      .menu button:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

      .chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
      .chip-wrap { position: relative; }
      .chip { font-family: var(--font-mono); font-size: 14px; font-weight: 500; padding: 5px 11px; border-radius: var(--r-sm); background: color-mix(in oklab, var(--accent) 14%, var(--bg-1)); border: 1px solid color-mix(in oklab, var(--accent) 35%, var(--line)); color: var(--accent); cursor: pointer; }
      .chip:hover { filter: brightness(1.15); }
      .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .chip-add { width: 28px; height: 28px; border-radius: var(--r-sm); background: var(--bg-1); border: 1px dashed var(--line); color: var(--text-mid); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; }
      .chip-add:hover { color: var(--accent); border-color: color-mix(in oklab, var(--accent) 50%, var(--line)); }
      .chip-add:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .note-menu { position: absolute; z-index: 20; top: calc(100% + 6px); left: 0; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-sm); box-shadow: 0 10px 24px -8px rgba(0,0,0,0.5); display: none; padding: 6px; width: 168px; }
      .note-menu.is-open { display: block; }
      .note-menu__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
      .note-menu__grid button { font-family: var(--font-mono); font-size: 12px; background: var(--bg-1); border: 1px solid var(--line); color: var(--text-hi); border-radius: 4px; padding: 6px 0; cursor: pointer; }
      .note-menu__grid button:hover { border-color: var(--accent); color: var(--accent); }
      .note-menu__del { margin-top: 6px; width: 100%; text-align: center; background: none; border: none; color: var(--sem-red); font-family: var(--font-mono); font-size: 11.5px; padding: 7px 0; cursor: pointer; border-top: 1px solid var(--line); }
      .note-menu__del:hover { text-decoration: underline; }

      .seq { display: flex; flex-wrap: wrap; gap: 6px; }
      .seq__note { font-family: var(--font-mono); font-size: 13px; font-weight: 500; padding: 6px 10px; border-radius: var(--r-sm); background: var(--bg-1); border: 1px solid var(--line); color: var(--text-hi); }
      .seq__note b { color: var(--accent); font-weight: 600; }

      .playbar { display: flex; gap: 8px; margin-bottom: 14px; }
      .playbtn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; padding: 8px 13px; border-radius: var(--r-md); background: var(--bg-2); border: 1px solid var(--line); color: var(--text-mid); cursor: pointer; }
      .playbtn:hover { color: var(--text-hi); border-color: var(--text-lo); }
      .playbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .playbtn__ico { font-size: 10px; line-height: 1; }
      .playbtn.is-playing { background: color-mix(in oklab, var(--accent) 14%, var(--bg-2)); border-color: color-mix(in oklab, var(--accent) 45%, var(--line)); color: var(--accent); }

      .foot { width: 100%; display: flex; align-items: center; justify-content: center; padding: 16px 18px; border-top: 1px solid var(--line); background: var(--bg-2); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.03em; color: var(--text-lo); }
      .foot a { color: var(--text-mid); text-decoration: none; }
      .foot a:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="mark"><img src="assets/logo.svg" alt="ArpLens" /><span class="word">ARPLENS</span></div>
      <div class="status"><span class="dot"></span> READY · v2.1</div>
    </div>

    <main>
      <div class="hero">
        <div class="brand">
          <img src="assets/logo.svg" alt="" class="brand__mark" />
          <h1>Arp<b>Lens</b></h1>
        </div>
        <p class="headline">Arpeggio Sandbox</p>
        <p class="subtitle">Experiment with arpeggiator settings — no audio required.</p>
      </div>

      <div class="card">
        <div class="card__strip">
          <div class="card__id"><span class="card__num">04</span><span class="card__title">SANDBOX</span></div>
        </div>
        <div class="card__body">
          <div class="playbar">
            <button class="playbtn" type="button" data-play="modulation"><span class="playbtn__ico">▶</span>Play Modulation</button>
          </div>
          <div class="confrow">
            <span class="confrow__title">Settings</span>
          </div>

          <div class="grid">
            <div class="param">
              <div class="param__k">
                <span class="param__k-l">BPM</span>
                <div class="mini-ops">
                  <button class="icnbtn" id="bpmHalf" type="button">÷2</button>
                  <button class="icnbtn" id="bpmDouble" type="button">×2</button>
                </div>
              </div>
              <div class="param__row">
                <div class="param__v" id="bpmVal">120</div>
                <div class="steppers">
                  <button class="icnbtn" id="bpmMinus" type="button" aria-label="Decrease BPM">−</button>
                  <button class="icnbtn" id="bpmPlus" type="button" aria-label="Increase BPM">+</button>
                </div>
              </div>
            </div>

            <div class="param">
              <div class="param__k"><span class="param__k-l">Style</span></div>
              <div class="param__v param__v--editable" id="styleVal" role="button" tabindex="0" aria-haspopup="true">Up</div>
              <div class="menu" id="styleMenu" role="menu">
                <button data-val="Up" class="is-current">Up</button>
                <button data-val="Down">Down</button>
                <button data-val="UpDown">UpDown</button>
                <button data-val="DownUp">DownUp</button>
              </div>
            </div>

            <div class="param">
              <div class="param__k"><span class="param__k-l">Rate</span></div>
              <div class="param__v param__v--editable" id="rateVal" role="button" tabindex="0" aria-haspopup="true">1/16</div>
              <div class="menu" id="rateMenu" role="menu">
                <button data-val="1/4">1/4</button>
                <button data-val="1/8">1/8</button>
                <button data-val="1/16" class="is-current">1/16</button>
                <button data-val="1/32">1/32</button>
                <button data-val="1/4T">1/4T</button>
                <button data-val="1/8T">1/8T</button>
                <button data-val="1/16T">1/16T</button>
                <button data-val="1/32T">1/32T</button>
              </div>
            </div>

            <div class="param">
              <div class="param__k"><span class="param__k-l">Octaves</span></div>
              <div class="param__row">
                <div class="param__v" id="octVal">2</div>
                <div class="steppers">
                  <button class="icnbtn" id="octMinus" type="button" aria-label="Decrease octaves">−</button>
                  <button class="icnbtn" id="octPlus" type="button" aria-label="Increase octaves">+</button>
                </div>
              </div>
            </div>

            <div class="param param--wide">
              <div class="param__k">Input Notes</div>
              <div class="chips" id="notesRow">
                <button class="chip-add" id="addNoteBtn" type="button" aria-label="Add note">+</button>
              </div>
            </div>

            <div class="param param--wide">
              <div class="param__k">Detected Sequence</div>
              <div class="seq" id="seqRow"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="foot">© 2026 ArpLens. Open source on&nbsp;<a href="https://github.com" target="_blank" rel="noopener">GitHub</a>.</div>

    <script>
      (function () {
        const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        let notes = ['C', 'E', 'G'];
        let bpm = 120;
        let octaves = 2;

        const notesRow = document.getElementById('notesRow');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const seqRow = document.getElementById('seqRow');

        function closeAllMenus(except) {
          document.querySelectorAll('.menu.is-open, .note-menu.is-open').forEach(m => { if (m !== except) m.classList.remove('is-open'); });
        }
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.chip-wrap') && !e.target.closest('.chip-add') && !e.target.closest('.param__k')) closeAllMenus();
        });

        function renderNotes() {
          notesRow.innerHTML = '';
          notes.forEach((n, i) => {
            const wrap = document.createElement('div');
            wrap.className = 'chip-wrap';
            const btn = document.createElement('button');
            btn.className = 'chip'; btn.type = 'button'; btn.textContent = n;
            const menu = document.createElement('div');
            menu.className = 'note-menu';
            const grid = document.createElement('div');
            grid.className = 'note-menu__grid';
            NOTES.forEach(opt => {
              const o = document.createElement('button');
              o.textContent = opt; o.type = 'button';
              o.addEventListener('click', () => { notes[i] = opt; renderNotes(); renderSeq(); });
              grid.appendChild(o);
            });
            const del = document.createElement('button');
            del.className = 'note-menu__del'; del.type = 'button'; del.textContent = 'Delete';
            del.addEventListener('click', () => { notes.splice(i, 1); renderNotes(); renderSeq(); });
            menu.appendChild(grid); menu.appendChild(del);
            btn.addEventListener('click', (e) => { e.stopPropagation(); const open = menu.classList.contains('is-open'); closeAllMenus(); if (!open) menu.classList.add('is-open'); });
            wrap.appendChild(btn); wrap.appendChild(menu);
            notesRow.appendChild(wrap);
          });
          notesRow.appendChild(addNoteBtn);
        }
        addNoteBtn.addEventListener('click', () => { notes.push('C'); renderNotes(); renderSeq(); });

        function renderSeq() {
          seqRow.innerHTML = '';
          if (!notes.length) return;
          const seq = [];
          for (let o = 0; o < Math.max(1, octaves); o++) {
            notes.forEach(n => seq.push(n + (2 + o)));
          }
          seq.forEach((n, i) => {
            const el = document.createElement('span');
            el.className = 'seq__note';
            el.innerHTML = i === 0 ? '<b>' + n + '</b>' : n;
            seqRow.appendChild(el);
          });
        }
        renderNotes(); renderSeq();

        const bpmVal = document.getElementById('bpmVal');
        function renderBpm() { bpmVal.textContent = Math.round(bpm); }
        document.getElementById('bpmMinus').addEventListener('click', () => { bpm = Math.max(20, bpm - 1); renderBpm(); });
        document.getElementById('bpmPlus').addEventListener('click', () => { bpm = Math.min(300, bpm + 1); renderBpm(); });
        function updateRateButtons() {
          document.getElementById('bpmHalf').disabled = bpm / 2 < 20;
          document.getElementById('bpmDouble').disabled = bpm * 2 > 300;
        }
        document.getElementById('bpmHalf').addEventListener('click', () => { if (bpm / 2 >= 20) { bpm = bpm / 2; renderBpm(); updateRateButtons(); } });
        document.getElementById('bpmDouble').addEventListener('click', () => { if (bpm * 2 <= 300) { bpm = bpm * 2; renderBpm(); updateRateButtons(); } });
        updateRateButtons();

        const octVal = document.getElementById('octVal');
        document.getElementById('octMinus').addEventListener('click', () => { octaves = Math.max(1, octaves - 1); octVal.textContent = octaves; renderSeq(); });
        document.getElementById('octPlus').addEventListener('click', () => { octaves = Math.min(4, octaves + 1); octVal.textContent = octaves; renderSeq(); });

        function wireMenu(btnId, menuId, valEl, onPick) {
          const btn = document.getElementById(btnId);
          const menu = document.getElementById(menuId);
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const open = menu.classList.contains('is-open');
            closeAllMenus();
            if (!open) menu.classList.add('is-open');
          });
          menu.querySelectorAll('button').forEach(b => {
            b.addEventListener('click', () => {
              menu.querySelectorAll('button').forEach(x => x.classList.remove('is-current'));
              b.classList.add('is-current');
              valEl.textContent = b.dataset.val;
              onPick(b.dataset.val);
              menu.classList.remove('is-open');
            });
          });
        }
        wireMenu('styleVal', 'styleMenu', document.getElementById('styleVal'), () => {});
        wireMenu('rateVal', 'rateMenu', document.getElementById('rateVal'), () => {});

        const playGroups = new Map();
        document.querySelectorAll('[data-play]').forEach(b => {
          const g = b.parentElement;
          if (!playGroups.has(g)) playGroups.set(g, []);
          playGroups.get(g).push(b);
        });
        function paint(btn, on) {
          btn.classList.toggle('is-playing', on);
          const ico = btn.querySelector('.playbtn__ico');
          if (ico) ico.textContent = on ? '❚❚' : '▶';
        }
        playGroups.forEach(group => {
          group.forEach(b => b.addEventListener('click', () => {
            const wasOn = b.classList.contains('is-playing');
            group.forEach(x => paint(x, false));
            paint(b, !wasOn);
          }));
        });
      })();
    </script>
  </body>
</html>
