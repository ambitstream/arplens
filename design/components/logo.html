<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
        padding: 40px;
        background: var(--bg-0);
        font-family: var(--font-sans);
      }
      .row { display: flex; align-items: center; gap: 40px; }
      .name { flex: 0 0 190px; }
      .name h3 { color: var(--text-hi); font-size: 15px; font-weight: 600; }
      .name p { color: var(--text-mid); font-size: 12px; margin-top: 3px; line-height: 1.4; }
      .sizes { display: flex; align-items: center; gap: 28px; }
      .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .box {
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--line); border-radius: var(--r-md); background: var(--bg-1);
      }
      .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-lo); letter-spacing: 0.06em; }
      hr { border: none; border-top: 1px solid var(--line); }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="name"><h3>A · Full scene</h3><p>Waveform + lens + piano roll</p></div>
      <div class="sizes">
        <div class="tile"><div class="box" style="width:132px;height:132px"><img src="../assets/logo.svg" width="108" height="108" alt="A large" /></div><span class="lbl">108</span></div>
        <div class="tile"><div class="box" style="width:72px;height:72px"><img src="../assets/logo.svg" width="52" height="52" alt="A med" /></div><span class="lbl">52</span></div>
        <div class="tile"><div class="box" style="width:48px;height:48px"><img src="../assets/logo.svg" width="32" height="32" alt="A small" /></div><span class="lbl">32</span></div>
      </div>
    </div>
    <hr />
    <div class="row">
      <div class="name"><h3>B · Lens-forward</h3><p>Bold ascending cubes, no waveform</p></div>
      <div class="sizes">
        <div class="tile"><div class="box" style="width:132px;height:132px"><img src="../assets/logo-b.svg" width="108" height="108" alt="B large" /></div><span class="lbl">108</span></div>
        <div class="tile"><div class="box" style="width:72px;height:72px"><img src="../assets/logo-b.svg" width="52" height="52" alt="B med" /></div><span class="lbl">52</span></div>
        <div class="tile"><div class="box" style="width:48px;height:48px"><img src="../assets/logo-b.svg" width="32" height="32" alt="B small" /></div><span class="lbl">32</span></div>
      </div>
    </div>
    <hr />
    <div class="row">
      <div class="name"><h3>C · Monogram</h3><p>Single arp staircase in lens</p></div>
      <div class="sizes">
        <div class="tile"><div class="box" style="width:132px;height:132px"><img src="../assets/logo-c.svg" width="108" height="108" alt="C large" /></div><span class="lbl">108</span></div>
        <div class="tile"><div class="box" style="width:72px;height:72px"><img src="../assets/logo-c.svg" width="52" height="52" alt="C med" /></div><span class="lbl">52</span></div>
        <div class="tile"><div class="box" style="width:48px;height:48px"><img src="../assets/logo-c.svg" width="32" height="32" alt="C small" /></div><span class="lbl">32</span></div>
      </div>
    </div>
  </body>
</html>
