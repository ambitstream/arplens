<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footer — Amber Rack</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: flex; align-items: flex-end; justify-content: center; background: var(--bg-0); font-family: var(--font-sans); }
      .foot {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px 18px;
        border-top: 1px solid var(--line);
        background: var(--bg-2);
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.03em;
        color: var(--text-lo);
      }
      .foot a { color: var(--text-mid); text-decoration: none; }
      .foot a:hover { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="foot">© 2026 ArpLens. Open source on&nbsp;<a href="https://github.com" target="_blank" rel="noopener">GitHub</a>.</div>
  </body>
</html>
