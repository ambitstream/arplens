<!-- @dsCard group="Components" viewport="720x640" name="AnalyzeButton" subtitle="Idle → Loading → Completed / Failed" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analysis — Amber Rack</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 34px;
        background: var(--bg-0);
        color: var(--text-hi);
        font-family: var(--font-sans);
        padding: 48px 24px;
      }
      .stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }
      .stack__lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-lo); }

      .card {
        width: 460px;
        border-radius: var(--r-lg);
        background: var(--bg-1);
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .card__strip {
        display: flex; align-items: center; justify-content: space-between;
        padding: 11px 16px; border-bottom: 1px solid var(--line);
      }
      .card__id { display: flex; align-items: center; gap: 9px; }
      .card__num { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--bg-0); background: var(--accent); padding: 2px 6px; border-radius: 3px; font-weight: 600; }
      .card__title { font-family: var(--font-mono); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-hi); }
      .card__hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; }
      .card__hint--idle { color: var(--text-lo); }
      .card__hint--loading { color: var(--accent); }
      .card__hint--ok { color: var(--sem-green); }
      .card__hint--fail { color: var(--sem-red); }
      .card__body { padding: 22px 18px; display: flex; flex-direction: column; align-items: center; gap: 14px; }

      .btn {
        width: 100%;
        padding: 14px;
        border-radius: var(--r-md);
        border: none;
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        transition: filter 140ms ease, opacity 140ms ease;
      }
      .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
      .btn--idle { background: var(--accent); color: var(--bg-0); }
      .btn--idle:hover { filter: brightness(1.08); }
      .btn--loading { background: color-mix(in oklab, var(--accent) 30%, var(--bg-2)); color: var(--text-mid); cursor: default; }
      .btn--completed { background: color-mix(in oklab, var(--sem-green) 16%, var(--bg-2)); color: var(--sem-green); border: 1px solid color-mix(in oklab, var(--sem-green) 45%, var(--line)); cursor: default; }
      .btn--failed { background: var(--accent); color: var(--bg-0); }
      .btn--failed:hover { filter: brightness(1.08); }

      .spinner {
        width: 15px; height: 15px; border-radius: 50%;
        border: 2px solid color-mix(in oklab, var(--bg-0) 35%, transparent);
        border-top-color: var(--bg-0);
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .status { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; display: flex; align-items: center; gap: 8px; }
      .status--idle { color: var(--text-lo); }
      .status--loading { color: var(--accent); }
      .status--ok { color: var(--sem-green); }
      .status--fail { color: var(--sem-red); }
      .status__dot { width: 6px; height: 6px; border-radius: 50%; }
      .status--ok .status__dot { background: var(--sem-green); box-shadow: 0 0 6px -1px var(--sem-green); }
      .status--fail .status__dot { background: var(--sem-red); box-shadow: 0 0 6px -1px var(--sem-red); }

      .disabled-note {
        width: 100%;
        border-radius: var(--r-sm);
        border: 1px dashed var(--line);
        background: color-mix(in oklab, var(--bg-2) 70%, transparent);
        color: var(--text-lo);
        font-size: 12px;
        padding: 10px 12px;
        text-align: center;
      }

      .error-msg {
        width: 100%;
        border-radius: var(--r-sm);
        border: 1px solid color-mix(in oklab, var(--sem-red) 40%, var(--line));
        background: color-mix(in oklab, var(--sem-red) 8%, var(--bg-2));
        color: var(--text-mid);
        font-size: 12.5px;
        line-height: 1.5;
        padding: 12px 14px;
      }
      .error-msg b { color: var(--sem-red); font-weight: 600; }
    </style>
  </head>
  <body>
    <!-- IDLE -->
    <div class="stack">
      <span class="stack__lbl">Idle</span>
      <div class="card">
        <div class="card__strip">
          <div class="card__id"><span class="card__num">03</span><span class="card__title">ANALYSIS</span></div>
          <span class="card__hint card__hint--idle">READY</span>
        </div>
        <div class="card__body">
          <button class="btn btn--idle" type="button">Analyze</button>
        </div>
      </div>
    </div>

    <!-- LOADING -->
    <div class="stack">
      <span class="stack__lbl">Loading</span>
      <div class="card">
        <div class="card__strip">
          <div class="card__id"><span class="card__num">03</span><span class="card__title">ANALYSIS</span></div>
          <span class="card__hint card__hint--loading">PROCESSING</span>
        </div>
        <div class="card__body">
          <button class="btn btn--loading" type="button" disabled>
            <span class="spinner"></span> Analyzing…
          </button>
          <div class="status status--loading"><span class="status__dot" style="background:var(--accent);box-shadow:0 0 6px -1px var(--accent)"></span>Analyzing...</div>
          <div class="disabled-note">Editing is disabled while analysis is in progress</div>
        </div>
      </div>
    </div>

    <!-- COMPLETED -->
    <div class="stack">
      <span class="stack__lbl">Completed</span>
      <div class="card">
        <div class="card__strip">
          <div class="card__id"><span class="card__num">03</span><span class="card__title">ANALYSIS</span></div>
          <span class="card__hint card__hint--ok">COMPLETE</span>
        </div>
        <div class="card__body">
          <button class="btn btn--completed" type="button" disabled>✓ Analysis complete</button>
          <div class="status status--ok"><span class="status__dot"></span>Results ready below</div>
        </div>
      </div>
    </div>

    <!-- FAILED -->
    <div class="stack">
      <span class="stack__lbl">Failed</span>
      <div class="card">
        <div class="card__strip">
          <div class="card__id"><span class="card__num">03</span><span class="card__title">ANALYSIS</span></div>
          <span class="card__hint card__hint--fail">FAILED</span>
        </div>
        <div class="card__body">
          <div class="error-msg"><b>No Repeating Arpeggio Detected.</b> Try a shorter loop that repeats seamlessly.</div>
          <button class="btn btn--failed" type="button">Analyze</button>
        </div>
      </div>
    </div>
  </body>
</html>
